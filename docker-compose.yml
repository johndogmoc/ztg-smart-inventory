version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ztg_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-ztg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ztg_password}
      POSTGRES_DB: ${DB_NAME:-ztg_inventory}
    volumes:
      - ztg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ztg_user -d ztg_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ztg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ztg_pgdata:
